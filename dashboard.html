<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <title>Pro Dashboard</title>
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>⚡ ToDoPro</h2>

    <a href="#">📊 Dashboard</a>
    <a href="#">➕ Tambah Task</a>
    <a href="#">👤 Profil</a>
    <a href="#">🚪 Logout</a>

    <button class="dark-btn" onclick="toggleDark()">🌙 Dark Mode</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <h2>Dashboard</h2>
      <div class="user">👋 Hi, User</div>
    </div>

    <!-- STATS -->
    <div class="stats">

      <div class="card stat">
        <h3>10</h3>
        <p>Total Task</p>
      </div>

      <div class="card stat green">
        <h3>6</h3>
        <p>Done</p>
      </div>

      <div class="card stat orange">
        <h3>4</h3>
        <p>Pending</p>
      </div>

    </div>

    <!-- TASKS -->
    <h3>Task List</h3>

    <div class="task-grid">

      <div class="task-card pending">
        <h3>Belajar HTML</h3>
        <p>Deadline: Hari ini</p>
        <div class="actions">
          <button class="done">✔ Done</button>
          <button class="delete">🗑</button>
        </div>
      </div>

      <div class="task-card done">
        <h3>Push GitHub</h3>
        <p>Completed</p>
        <div class="actions">
          <button class="delete">🗑</button>
        </div>
      </div>

      <div class="task-card pending">
        <h3>Buat Project PHP</h3>
        <p>Deadline: Besok</p>
        <div class="actions">
          <button class="done">✔ Done</button>
          <button class="delete">🗑</button>
        </div>
      </div>

    </div>

  </div>
</div>

<script>
function toggleDark(){
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
